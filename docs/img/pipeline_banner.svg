<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e17;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#111827;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" rx="12" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.06" stroke="#06b6d4" stroke-width="0.5">
    <line x1="0" y1="40" x2="900" y2="40"/><line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/><line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="0" y1="200" x2="900" y2="200"/><line x1="0" y1="240" x2="900" y2="240"/>
    <line x1="100" y1="0" x2="100" y2="280"/><line x1="200" y1="0" x2="200" y2="280"/>
    <line x1="300" y1="0" x2="300" y2="280"/><line x1="400" y1="0" x2="400" y2="280"/>
    <line x1="500" y1="0" x2="500" y2="280"/><line x1="600" y1="0" x2="600" y2="280"/>
    <line x1="700" y1="0" x2="700" y2="280"/><line x1="800" y1="0" x2="800" y2="280"/>
  </g>

  <!-- Simulated F/T waveform -->
  <g transform="translate(40, 160)" opacity="0.15">
    <polyline points="0,0 15,-20 30,15 45,-35 60,10 75,-25 90,30 105,-15 120,20 135,-40 150,5 165,-30 180,25 195,-10 210,35 225,-45 240,15 255,-20 270,30 285,-35 300,10 315,-25 330,20 345,-15 360,40 375,-30 390,5 405,-20 420,25 435,-40 450,15 465,-10 480,30 495,-35 510,20 525,-25 540,10 555,-45 570,35 585,-15 600,5 615,-30 630,25 645,-20 660,40 675,-35 690,15 705,-25 720,30 735,-10 750,20 765,-40 780,5 795,-30 810,25" 
      stroke="url(#accent)" stroke-width="2" fill="none"/>
  </g>

  <!-- Sensor icon -->
  <g transform="translate(60, 80)">
    <circle cx="40" cy="40" r="35" stroke="#06b6d4" stroke-width="2" fill="none" opacity="0.8"/>
    <circle cx="40" cy="40" r="25" stroke="#06b6d4" stroke-width="1" fill="none" opacity="0.4"/>
    <circle cx="40" cy="40" r="5" fill="#06b6d4" opacity="0.8"/>
    <!-- Axis arrows -->
    <line x1="40" y1="40" x2="40" y2="8" stroke="#ef4444" stroke-width="1.5" opacity="0.8"/>
    <line x1="40" y1="40" x2="72" y2="40" stroke="#22c55e" stroke-width="1.5" opacity="0.8"/>
    <line x1="40" y1="40" x2="58" y2="58" stroke="#3b82f6" stroke-width="1.5" opacity="0.8"/>
    <text x="42" y="6" fill="#ef4444" font-size="9" font-family="monospace" opacity="0.8">Fz</text>
    <text x="74" y="43" fill="#22c55e" font-size="9" font-family="monospace" opacity="0.8">Fx</text>
    <text x="60" y="68" fill="#3b82f6" font-size="9" font-family="monospace" opacity="0.8">Fy</text>
  </g>

  <!-- Title -->
  <text x="170" y="95" fill="white" font-size="36" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-weight="700" letter-spacing="-1">
    RoboDog F/T Pipeline
  </text>

  <!-- Subtitle -->
  <text x="170" y="125" fill="#94a3b8" font-size="14" font-family="'SF Mono', 'Fira Code', monospace">
    Real-time 6-axis force-torque sensing for assistive robot co-walking
  </text>

  <!-- Tech badges -->
  <g transform="translate(170, 145)">
    <rect x="0" y="0" width="70" height="22" rx="4" fill="#1e3a5f" opacity="0.8"/>
    <text x="35" y="15" fill="#06b6d4" font-size="10" font-family="monospace" text-anchor="middle">ROS2</text>
    
    <rect x="78" y="0" width="80" height="22" rx="4" fill="#1e3a5f" opacity="0.8"/>
    <text x="118" y="15" fill="#06b6d4" font-size="10" font-family="monospace" text-anchor="middle">200Hz</text>
    
    <rect x="166" y="0" width="80" height="22" rx="4" fill="#1e3a5f" opacity="0.8"/>
    <text x="206" y="15" fill="#06b6d4" font-size="10" font-family="monospace" text-anchor="middle">6-Axis</text>
    
    <rect x="254" y="0" width="100" height="22" rx="4" fill="#1e3a5f" opacity="0.8"/>
    <text x="304" y="15" fill="#06b6d4" font-size="10" font-family="monospace" text-anchor="middle">Robotous</text>

    <rect x="362" y="0" width="100" height="22" rx="4" fill="#1e3a5f" opacity="0.8"/>
    <text x="412" y="15" fill="#06b6d4" font-size="10" font-family="monospace" text-anchor="middle">Python 3.12</text>
  </g>

  <!-- Pipeline flow -->
  <g transform="translate(170, 190)">
    <!-- Boxes -->
    <rect x="0" y="0" width="110" height="50" rx="6" fill="#111827" stroke="#1e3a5f" stroke-width="1.5"/>
    <text x="55" y="22" fill="#e2e8f0" font-size="11" font-family="monospace" text-anchor="middle" font-weight="600">SENSOR</text>
    <text x="55" y="38" fill="#64748b" font-size="9" font-family="monospace" text-anchor="middle">RFT40-SA01</text>

    <rect x="155" y="0" width="110" height="50" rx="6" fill="#111827" stroke="#1e3a5f" stroke-width="1.5"/>
    <text x="210" y="22" fill="#e2e8f0" font-size="11" font-family="monospace" text-anchor="middle" font-weight="600">DRIVER</text>
    <text x="210" y="38" fill="#64748b" font-size="9" font-family="monospace" text-anchor="middle">UART 115200</text>

    <rect x="310" y="0" width="110" height="50" rx="6" fill="#111827" stroke="#1e3a5f" stroke-width="1.5"/>
    <text x="365" y="22" fill="#e2e8f0" font-size="11" font-family="monospace" text-anchor="middle" font-weight="600">PROCESSOR</text>
    <text x="365" y="38" fill="#64748b" font-size="9" font-family="monospace" text-anchor="middle">LPF + Grip</text>

    <rect x="465" y="0" width="110" height="50" rx="6" fill="#111827" stroke="#1e3a5f" stroke-width="1.5"/>
    <text x="520" y="22" fill="#e2e8f0" font-size="11" font-family="monospace" text-anchor="middle" font-weight="600">OUTPUT</text>
    <text x="520" y="38" fill="#64748b" font-size="9" font-family="monospace" text-anchor="middle">CSV + Viz</text>

    <!-- Arrows -->
    <line x1="110" y1="25" x2="155" y2="25" stroke="url(#accent)" stroke-width="2"/>
    <polygon points="152,20 158,25 152,30" fill="#06b6d4"/>

    <line x1="265" y1="25" x2="310" y2="25" stroke="url(#accent)" stroke-width="2"/>
    <polygon points="307,20 313,25 307,30" fill="#8b5cf6"/>

    <line x1="420" y1="25" x2="465" y2="25" stroke="url(#accent)" stroke-width="2"/>
    <polygon points="462,20 468,25 462,30" fill="#8b5cf6"/>
  </g>

  <!-- Corner accent -->
  <rect x="0" y="272" width="900" height="8" rx="0" fill="url(#accent)" opacity="0.6"/>
</svg>
