# =============================================================================
# Robotous 100N 2.5Nm 6-Axis Force-Torque Sensor Configuration
# Project: Assistive Robotic Dog Co-Walking (CITRIS)
# =============================================================================

ft_sensor_driver:
  ros__parameters:
    # --- Serial Connection ---
    serial_port: "/dev/ttyUSB0"       # Adjust to your device (check `ls /dev/ttyUSB*`)
    baud_rate: 115200                   # Robotous default; verify with sensor datasheet
    timeout_sec: 0.01                   # Serial read timeout (10ms for 100Hz)

    # --- Sensor Specs (Robotous RFT40-SA01) ---
    # Full-scale ranges (from datasheet):
    #   Force:  Fx,Fy=100N, Fz=150N
    #   Torque: Tx,Ty,Tz=2.5Nm
    #   Resolution: Fx,Fy=200mN, Fz=200mN, Tx,Ty,Tz=8mNm
    #   Max data rate: 200Hz (at 115200 baud)
    #   Overload capacity: 150% (Fx,Fy), 150%/300% (Fz+/Fz-), 150% (T)
    # Data conversion: Force = raw_int16 / DF, Torque = raw_int16 / DT
    #   DF=50, DT=2000 for RFT40-SA01
    sensor_model: "RFT40-SA01"
    
    # --- Sampling ---
    publish_rate_hz: 200.0              # Default sensor output rate (200Hz at 115200 baud)
    
    # --- Frame ---
    frame_id: "ft_sensor_link"          # TF frame for the sensor
    
    # --- Protocol ---
    # Robotous UART protocol (from manual Section 3.5.2):
    #   Command:  SOP(0x55) + Data(8B) + Checksum + EOP(0xAA) = 11 bytes
    #   Response: SOP(0x55) + Data(16B) + Checksum + EOP(0xAA) = 19 bytes
    # F/T data: 6x signed int16 (big-endian) + overload status byte
    # No configuration needed - protocol is handled by robotous_protocol.py

    # --- Calibration / Bias ---
    # These offsets are subtracted from raw readings.
    # Run the bias calibration script with no load to determine these.
    bias_fx: 0.0
    bias_fy: 0.0
    bias_fz: 0.0
    bias_tx: 0.0
    bias_ty: 0.0
    bias_tz: 0.0

ft_data_processor:
  ros__parameters:
    # --- Low-pass filter (Butterworth) ---
    filter_enabled: true
    filter_order: 2                     # 2nd-order Butterworth
    filter_cutoff_hz: 10.0              # Cutoff frequency (adjust for gait ~1-3Hz)
    sample_rate_hz: 200.0               # Must match driver publish rate (200Hz default)

    # --- Thresholds for grip detection ---
    # Based on literature: light stabilizing force ~5N (ref: proposal [3])
    force_magnitude_threshold_n: 2.0    # Min force to consider "gripping"
    torque_magnitude_threshold_nm: 0.1  # Min torque to consider "twisting"

    # --- Moving average window ---
    moving_avg_window: 5                # Samples for smoothing magnitude

ft_data_logger:
  ros__parameters:
    # --- CSV Logging ---
    csv_enabled: true
    csv_output_dir: "~/robodog_data/csv"
    csv_prefix: "ft_session"            # Files: ft_session_YYYYMMDD_HHMMSS.csv

    # --- Rosbag Logging ---
    rosbag_enabled: true
    rosbag_output_dir: "~/robodog_data/rosbags"
    
    # --- Session metadata ---
    participant_id: "P000"              # Set per participant
    trial_id: "T00"                     # Set per trial
    condition: "with_robot"             # "with_robot" or "without_robot"

ft_visualizer:
  ros__parameters:
    # --- Plot settings ---
    plot_window_sec: 10.0               # Seconds of data visible in plot
    update_rate_hz: 30.0                # Plot refresh rate
    show_raw: true                      # Show raw data
    show_filtered: true                 # Show filtered data overlay
